# 生产环境 Docker Compose 配置
# 使用方式: docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# 启动顺序：
#   postgres (build -> healthcheck 通过)
#   db-init  (Prisma Migrate + seed，等待 postgres 健康后运行一次，自身 exit 0)
#   neo4j -> graph-init (Neo4j schema migrations)
#   redis / minio / api / worker / web / nginx

x-api-env: &api-env
  NODE_ENV: production
  API_PORT: ${API_PORT}
  WEB_ORIGIN: ${WEB_ORIGIN}
  LOG_LEVEL: ${LOG_LEVEL}
  APP_TIME_ZONE: ${APP_TIME_ZONE}
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://redis:6379
  MINIO_ENDPOINT: minio
  MINIO_PORT: "9000"
  MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
  S3_REGION: ${S3_REGION}
  S3_BUCKET: ${S3_BUCKET}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: ${NEO4J_USER}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
  JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
  JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
  # 联合登录（CALL-13）与服务间调用：未配置时按空串透传，运行时视为未启用
  FEDERATED_TENANT_ALLOWLIST: ${FEDERATED_TENANT_ALLOWLIST}
  SERVICE_API_TOKEN: ${SERVICE_API_TOKEN}
  SERVICE_API_REQUIRE_SIGNATURE: ${SERVICE_API_REQUIRE_SIGNATURE}
  SERVICE_API_SIGNING_SECRET: ${SERVICE_API_SIGNING_SECRET}
  SERVICE_API_SIGNATURE_TOLERANCE_MS: ${SERVICE_API_SIGNATURE_TOLERANCE_MS}
  BOOTSTRAP_TENANT_ID: ${BOOTSTRAP_TENANT_ID}
  BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
  BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
  BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME}
  DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
  DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL}
  DASHSCOPE_LLM_MODEL: ${DASHSCOPE_LLM_MODEL}
  DASHSCOPE_EMBED_MODEL: ${DASHSCOPE_EMBED_MODEL}
  DASHSCOPE_EMBED_DIM: ${DASHSCOPE_EMBED_DIM}
  DASHSCOPE_LLM_MOCK: ${DASHSCOPE_LLM_MOCK}
  DASHSCOPE_EMBED_MOCK: ${DASHSCOPE_EMBED_MOCK}
  # QA 重排：env 校验不接受空串，.env.production 必须显式配置这两项
  DASHSCOPE_RERANK_MODEL: ${DASHSCOPE_RERANK_MODEL}
  DASHSCOPE_RERANK_MOCK: ${DASHSCOPE_RERANK_MOCK}
  SEARCH_BM25_TOPK: ${SEARCH_BM25_TOPK}
  SEARCH_VECTOR_TOPK: ${SEARCH_VECTOR_TOPK}
  SEARCH_RRF_K: ${SEARCH_RRF_K}
  SEARCH_RRF_FINAL_TOPK: ${SEARCH_RRF_FINAL_TOPK}
  CHUNK_SIZE: ${CHUNK_SIZE}
  CHUNK_OVERLAP: ${CHUNK_OVERLAP}
  EMBED_BATCH_SIZE: ${EMBED_BATCH_SIZE}
  FUNASR_HTTP_URL: ${FUNASR_HTTP_URL}
  FUNASR_TIMEOUT_MS: ${FUNASR_TIMEOUT_MS}
  PADDLEOCR_HTTP_URL: ${PADDLEOCR_HTTP_URL}
  PADDLEOCR_LANG: ${PADDLEOCR_LANG}
  PADDLEOCR_UPLOAD_FIELD: ${PADDLEOCR_UPLOAD_FIELD}
  PADDLEOCR_LANG_FIELD: ${PADDLEOCR_LANG_FIELD}
  PADDLEOCR_TIMEOUT_MS: ${PADDLEOCR_TIMEOUT_MS}
  OCR_PDF_RENDER_SCALE: ${OCR_PDF_RENDER_SCALE}
  OCR_PDF_MAX_PAGES: ${OCR_PDF_MAX_PAGES}
  DOCUMENT_UPLOAD_MAX_MB: ${DOCUMENT_UPLOAD_MAX_MB}
  DOCUMENT_WORKER_CONCURRENCY: ${DOCUMENT_WORKER_CONCURRENCY}

services:
  postgres:
    build:
      context: ./infra/docker/postgres
      dockerfile: Dockerfile
    container_name: ai-knowledge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-init:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: ai-knowledge-db-init
    restart: "no"
    environment:
      <<: *api-env
      DOCUMENT_WORKER_ENABLED: "false"
    entrypoint: ["sh", "-c", "cd /app/apps/api && pnpm prisma:migrate:deploy && cd /app && node apps/api/dist/seed/seed.js"]
    depends_on:
      postgres:
        condition: service_healthy

  neo4j:
    image: neo4j:5.20-community
    container_name: ai-knowledge-neo4j
    restart: unless-stopped
    environment:
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      # 与 docker-compose.yml（开发）对齐：apoc 过程放开 + 显式内存参数
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
    ports:
      - "${NEO4J_HTTP_PORT}:7474"
      - "${NEO4J_BOLT_PORT}:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  graph-init:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: ai-knowledge-graph-init
    restart: "no"
    environment:
      <<: *api-env
      DOCUMENT_WORKER_ENABLED: "false"
    command: ["node", "dist/database/neo4j/migrate.js"]
    depends_on:
      neo4j:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: ai-knowledge-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ai-knowledge-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PaddleOCR/FunASR 当前按外部服务接入，通过 PADDLEOCR_HTTP_URL / FUNASR_HTTP_URL 配置。

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: ai-knowledge-api
    restart: unless-stopped
    environment:
      <<: *api-env
      DOCUMENT_WORKER_ENABLED: "false"
    ports:
      - "${API_PORT}:9999"
    depends_on:
      db-init:
        condition: service_completed_successfully
      graph-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: ai-knowledge-worker
    restart: unless-stopped
    environment:
      <<: *api-env
      DOCUMENT_WORKER_ENABLED: "true"
    command: ["node", "dist/worker.js"]
    depends_on:
      db-init:
        condition: service_completed_successfully
      graph-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    # 生产按 ai-call 的 /knowledge zone 内嵌部署：basePath 构建期内联，运行期 next start
    # 重新读 next.config，需要构建参数与运行时环境保持一致（见 apps/web/next.config.mjs）
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /knowledge/api
        API_INTERNAL_URL: http://api:9999/api
        WEB_BASE_PATH: /knowledge
    container_name: ai-knowledge-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:9999/api
      NEXT_PUBLIC_API_URL: /knowledge/api
      WEB_BASE_PATH: /knowledge
    ports:
      - "${WEB_PORT}:8888"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: ai-knowledge-nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  minio_data:
