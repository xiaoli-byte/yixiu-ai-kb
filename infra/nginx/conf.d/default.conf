# Production Nginx Configuration
resolver 127.0.0.11 ipv6=off valid=10s;
resolver_timeout 5s;

# 上传文件大小限制
client_max_body_size 100m;

# 超时设置
client_body_timeout 300s;
proxy_read_timeout 300s;
proxy_connect_timeout 75s;
proxy_send_timeout 300s;

# 缓冲区设置
proxy_buffering on;
proxy_buffer_size 64k;
proxy_buffers 8 128k;
proxy_busy_buffers_size 256k;

# Rate Limiting Zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # 安全 headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 防止点击劫持
    add_header Content-Security-Policy "frame-ancestors 'self'" always;

    # Health Check Endpoint (无限制)
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ===== /knowledge zone（生产内嵌 ai-call 的 Multi-Zones 前缀） =====
    # web 以 WEB_BASE_PATH=/knowledge 构建，页面与 /_next 资源都在该前缀下；
    # API 请求在 nginx 层直接剥掉 /knowledge 前缀转给 api，不经 Next rewrite 中转。

    # 根路径引导到 zone 首页（直接访问本栈时的便利跳转）
    location = / {
        return 302 /knowledge/;
    }

    # zone API 健康检查（api 的 /health 不带 /api 全局前缀）
    location = /knowledge/api/health {
        proxy_pass http://api:9999/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # zone 文件上传（大文件 + 关闭请求缓冲）
    location /knowledge/api/documents/upload {
        limit_req zone=upload_limit burst=20 nodelay;

        client_max_body_size 100m;
        proxy_pass http://api:9999/api/documents/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;

        proxy_request_buffering off;
        proxy_buffering off;
    }

    # zone API 代理（/knowledge/api/* -> api:9999/api/*，SSE 友好）
    location /knowledge/api/ {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass http://api:9999/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # SSE 流式传输配置
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;

        # WebSocket 支持 (如需要)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # zone 下的 Next.js 静态资源 (长期缓存)
    location /knowledge/_next/static/ {
        proxy_pass http://web:8888;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
        expires 1y;
        access_log off;
        etag on;
    }

    # API 健康检查
    location = /api/health {
        proxy_pass http://api:9999/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # API 代理
    location /api/ {
        limit_req zone=api_limit burst=200 nodelay;
        
        proxy_pass http://api:9999;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # SSE 流式传输配置
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        
        # WebSocket 支持 (如需要)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 文件上传代理
    location /api/documents/upload {
        limit_req zone=upload_limit burst=20 nodelay;
        
        client_max_body_size 100m;
        proxy_pass http://api:9999;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        
        # 关闭代理缓冲以支持大文件
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Next.js 静态资源 (长期缓存)
    location /_next/static/ {
        proxy_pass http://web:8888;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
        expires 1y;
        access_log off;
        
        # 添加静态资源 ETag 支持
        etag on;
    }

    # 公共静态资源
    location /static/ {
        proxy_pass http://web:8888;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
        access_log off;
    }

    # Next.js 资源 (CSS, JS)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://web:8888;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
        access_log off;
    }

    # Web 前端 (SPA fallback)
    location / {
        proxy_pass http://web:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # MinIO Console 代理 (可选)
    location /minio-console/ {
        rewrite ^/minio-console/(.*) /$1 break;
        proxy_pass http://minio:9001/;
        proxy_http_version 1.1;
        proxy_set_header Host 47.110.89.174:9001;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

